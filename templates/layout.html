<!DOCTYPE html>
<html>

<head>

<title>APLIKACJA LICZARKOWA</title>

<link rel="stylesheet" href="/static/style.css?v=20260425-2">

<style>

body{
font-family: Arial;
background:#f4f6f7;
margin:0;
}

.wrapper{
min-height:100vh;
}

.sidebar{
position:fixed;
top:0;
left:0;
bottom:0;
width:min(320px, calc(100vw - 28px));
background:linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(244, 249, 255, 0.98) 100%);
color:#0f172a;
padding:84px 18px 18px;
box-sizing:border-box;
transform:translateX(-100%);
transition:transform 0.25s ease;
z-index:40;
border-right:1px solid #dbe6f3;
box-shadow:22px 0 44px rgba(15, 23, 42, 0.16);
backdrop-filter:blur(16px);
}

.sidebar.open{
transform:translateX(0);
}

.sidebar h2{
margin:0;
font-size:16px;
font-weight:800;
letter-spacing:0.08em;
text-transform:uppercase;
color:#64748b;
}

.sidebar a{
display:flex;
align-items:center;
justify-content:space-between;
color:#0f172a;
text-decoration:none;
padding:14px 16px;
margin-bottom:10px;
border-radius:16px;
border:1px solid transparent;
font-size:17px;
font-weight:700;
line-height:1.25;
transition:background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

.sidebar a:hover{
background:#eff6ff;
border-color:#bfdbfe;
box-shadow:0 10px 22px rgba(148, 163, 184, 0.16);
transform:translateX(2px);
}

.sidebar a.active{
background:linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
border-color:#93c5fd;
color:#1d4ed8;
box-shadow:0 14px 28px rgba(37, 99, 235, 0.18);
}

.sidebar_section{
display:flex;
flex-direction:column;
gap:16px;
height:100%;
}

.sidebar_brand{
display:flex;
flex-direction:column;
gap:8px;
padding:14px 14px 4px;
}

.sidebar_kicker{
margin:0;
font-size:12px;
font-weight:800;
letter-spacing:0.16em;
text-transform:uppercase;
color:#2563eb;
}

.sidebar_note{
margin:0;
font-size:13px;
line-height:1.6;
color:#64748b;
}

.sidebar_nav{
display:flex;
flex-direction:column;
gap:4px;
}

.sidebar_link_label{
display:inline-flex;
align-items:center;
gap:10px;
}

.sidebar_link_badge{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:28px;
height:28px;
padding:0 8px;
border-radius:999px;
background:#f8fafc;
border:1px solid #e2e8f0;
color:#64748b;
font-size:11px;
font-weight:800;
letter-spacing:0.08em;
text-transform:uppercase;
}

.sidebar a.active .sidebar_link_badge{
background:#ffffff;
border-color:#bfdbfe;
color:#2563eb;
}

.sidebar_spacer{
flex:1;
}

.content{
width:100%;
box-sizing:border-box;
padding:88px 32px 32px;
}

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:72px;
display:flex;
align-items:center;
gap:16px;
padding:0 20px;
box-sizing:border-box;
background:rgba(244, 246, 247, 0.92);
backdrop-filter:blur(10px);
z-index:30;
}

.menu_toggle{
display:inline-flex;
align-items:center;
justify-content:center;
width:48px;
height:48px;
padding:0;
border-radius:14px;
border:1px solid #dbe4ef;
background:#ffffff;
color:#0f172a;
box-shadow:0 10px 24px rgba(15, 23, 42, 0.08);
cursor:pointer;
}

.menu_toggle:hover{
background:#f8fafc;
}

.menu_toggle_bar{
display:block;
width:18px;
height:2px;
background:#0f172a;
border-radius:999px;
position:relative;
}

.menu_toggle_bar::before,
.menu_toggle_bar::after{
content:"";
position:absolute;
left:0;
width:18px;
height:2px;
background:#0f172a;
border-radius:999px;
}

.menu_toggle_bar::before{
top:-6px;
}

.menu_toggle_bar::after{
top:6px;
}

.topbar_title{
font-size:14px;
font-weight:700;
letter-spacing:0.08em;
text-transform:uppercase;
color:#64748b;
}

.sidebar_backdrop{
position:fixed;
inset:0;
background:rgba(15, 23, 42, 0.18);
opacity:0;
pointer-events:none;
transition:opacity 0.25s ease;
z-index:35;
}

.sidebar_backdrop.open{
opacity:1;
pointer-events:auto;
}

/* GLOBALNE STYLE APLIKACJI */

.container{
background:white;
padding:30px;
border-radius:10px;
width:700px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin:0 auto;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

input.search_box{
width:100%;
padding:10px 12px !important;
margin-top:5px;
margin-bottom:15px;
border-radius:8px !important;
border:1px solid #d1d5db !important;
background:#ffffff !important;
box-shadow:0 1px 2px rgba(15, 23, 42, 0.06) !important;
font-size:14px;
box-sizing:border-box;
}

input.historia_search.search_box{
margin:0;
padding:6px 34px 6px 10px !important;
border-radius:6px !important;
font-size:13px;
height:32px;
}

button{
padding:12px;
background:#3498db;
color:white;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#2980b9;
}

.hil_switch{
display:inline-flex !important;
gap:6px !important;
padding:4px !important;
background:#f5f7fb !important;
border-radius:10px !important;
width:auto !important;
flex-wrap:nowrap !important;
}

.hil_switch button{
display:inline-flex !important;
align-items:center !important;
justify-content:center !important;
width:auto !important;
min-width:0 !important;
padding:6px 14px !important;
margin:0 !important;
border:none !important;
border-radius:8px !important;
background:transparent !important;
color:#475569 !important;
font-size:13px !important;
font-weight:600 !important;
line-height:1.2 !important;
white-space:nowrap !important;
box-shadow:none !important;
flex:none !important;
}

.hil_switch button:hover{
background:#e9eefc !important;
}

.hil_switch button.active{
background:#2563eb !important;
color:#fff !important;
}

.sekcja_naglowek{
display:flex;
align-items:baseline;
justify-content:flex-start;
gap:10px;
flex-wrap:wrap;
}

.sekcja_naglowek .mini_btn{
display:inline-flex;
align-items:center;
width:auto !important;
min-width:0;
padding:5px 10px !important;
margin:0;
background:#f3f6fb !important;
color:#4b5563 !important;
border:1px solid #dbe3ef !important;
border-radius:999px !important;
box-shadow:none !important;
font-size:12px;
font-weight:500;
line-height:1;
cursor:pointer;
white-space:nowrap;
transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.sekcja_naglowek .mini_btn:hover{
background:#e8eef8 !important;
color:#1f2937 !important;
border-color:#c8d5e6 !important;
text-decoration:none;
}

.panel{
margin-top:25px;
padding:20px;
background:#ecf0f1;
border-radius:8px;
}

.rekomendacja{
font-size:28px;
font-weight:bold;
color:#2c3e50;
margin-bottom:10px;
}

.zakres{
font-size:18px;
margin-bottom:15px;
}

.crm{
margin-top:15px;
}

#crm_text{
white-space: pre-line;
line-height:1.3;
font-size:15px;
}

.copy{
background:#27ae60;
margin-top:10px;
}

.copy:hover{
background:#1e8449;
}

.btn_add_profile{
background:#ecf0f1;
color:#2c3e50;
margin-top:10px;
margin-bottom:10px;
}

.btn_add_profile:hover{
background:#dfe6e9;
}

.btn_remove{
background:#e74c3c;
margin-bottom:10px;
}

.btn_remove:hover{
background:#c0392b;
}

.lista{
border:1px solid #ccc;
max-height:150px;
overflow-y:auto;
margin-bottom:10px;
}

.lista div{
padding:6px;
cursor:pointer;
}

.lista div:hover{
background:#ecf0f1;
}

@media (max-width: 900px){
.content{
padding:84px 16px 24px;
}

.topbar{
padding:0 16px;
}
}

</style>

</head>

<body>

<div class="wrapper">

<div class="topbar">
<button type="button" class="menu_toggle" id="menu_toggle" aria-label="Pokaż moduły" aria-expanded="false" aria-controls="sidebar">
<span class="menu_toggle_bar"></span>
</button>
<div class="topbar_title">Moduły</div>
</div>

<div class="sidebar_backdrop" id="sidebar_backdrop"></div>

<div class="sidebar" id="sidebar">
<div class="sidebar_section">
<div class="sidebar_brand">
<p class="sidebar_kicker">Nawigacja</p>
<h2>Moduły</h2>
<p class="sidebar_note">Szybkie przełączanie między kalkulatorem, rozcieńczeniami, cenami i historią.</p>
</div>

<nav class="sidebar_nav" aria-label="Moduły">
<a href="/" class="{% if request.url.path == '/' %}active{% endif %}"><span class="sidebar_link_label">Kalkulator</span><span class="sidebar_link_badge">01</span></a>
<a href="/rozcienczenia" class="{% if request.url.path.startswith('/rozcienczenia') %}active{% endif %}"><span class="sidebar_link_label">Rozcieńczenia</span><span class="sidebar_link_badge">02</span></a>
<a href="/ceny" class="{% if request.url.path.startswith('/ceny') %}active{% endif %}"><span class="sidebar_link_label">Ceny</span><span class="sidebar_link_badge">03</span></a>
<a href="/historia" class="{% if request.url.path.startswith('/historia') %}active{% endif %}"><span class="sidebar_link_label">Historia</span><span class="sidebar_link_badge">04</span></a>
</nav>

<div class="sidebar_spacer"></div>
</div>
</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

</div>

<!-- <script src="/static/main.js"></script> -->

<script>
(function () {
	const sidebar = document.getElementById("sidebar")
	const toggle = document.getElementById("menu_toggle")
	const backdrop = document.getElementById("sidebar_backdrop")

	if (!sidebar || !toggle || !backdrop) return

	function setOpen(isOpen) {
		sidebar.classList.toggle("open", isOpen)
		backdrop.classList.toggle("open", isOpen)
		toggle.setAttribute("aria-expanded", String(isOpen))
	}

	toggle.addEventListener("click", function () {
		setOpen(!sidebar.classList.contains("open"))
	})

	backdrop.addEventListener("click", function () {
		setOpen(false)
	})

	sidebar.querySelectorAll("a").forEach(function (link) {
		link.addEventListener("click", function () {
			setOpen(false)
		})
	})

	document.addEventListener("keydown", function (event) {
		if (event.key === "Escape") {
			setOpen(false)
		}
	})
})()
</script>

</body>

</html>
