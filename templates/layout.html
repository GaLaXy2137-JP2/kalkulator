<!DOCTYPE html>
<html>

<head>

<title>APLIKACJA LICZARKOWA</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
font-family: Arial;
background:#f4f6f7;
margin:0;
}

.wrapper{
display:flex;
}

.sidebar{
width:220px;
background:#2c3e50;
color:white;
min-height:100vh;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:8px;
border-radius:5px;
}

.sidebar a:hover{
background:#34495e;
}

.content{
flex:1;
padding:40px;
}

/* GLOBALNE STYLE APLIKACJI */

.container{
background:white;
padding:30px;
border-radius:10px;
width:700px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin:0 auto;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:12px;
background:#3498db;
color:white;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#2980b9;
}

.sekcja_naglowek{
display:flex;
align-items:baseline;
justify-content:flex-start;
gap:10px;
flex-wrap:wrap;
}

.sekcja_naglowek .mini_btn{
display:inline-flex;
align-items:center;
width:auto !important;
min-width:0;
padding:5px 10px !important;
margin:0;
background:#f3f6fb !important;
color:#4b5563 !important;
border:1px solid #dbe3ef !important;
border-radius:999px !important;
box-shadow:none !important;
font-size:12px;
font-weight:500;
line-height:1;
cursor:pointer;
white-space:nowrap;
transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.sekcja_naglowek .mini_btn:hover{
background:#e8eef8 !important;
color:#1f2937 !important;
border-color:#c8d5e6 !important;
text-decoration:none;
}

.panel{
margin-top:25px;
padding:20px;
background:#ecf0f1;
border-radius:8px;
}

.rekomendacja{
font-size:28px;
font-weight:bold;
color:#2c3e50;
margin-bottom:10px;
}

.zakres{
font-size:18px;
margin-bottom:15px;
}

.crm{
margin-top:15px;
}

#crm_text{
white-space: pre-line;
line-height:1.3;
font-size:15px;
}

.copy{
background:#27ae60;
margin-top:10px;
}

.copy:hover{
background:#1e8449;
}

.btn_add_profile{
background:#ecf0f1;
color:#2c3e50;
margin-top:10px;
margin-bottom:10px;
}

.btn_add_profile:hover{
background:#dfe6e9;
}

.btn_remove{
background:#e74c3c;
margin-bottom:10px;
}

.btn_remove:hover{
background:#c0392b;
}

.lista{
border:1px solid #ccc;
max-height:150px;
overflow-y:auto;
margin-bottom:10px;
}

.lista div{
padding:6px;
cursor:pointer;
}

.lista div:hover{
background:#ecf0f1;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<h2>Moduły</h2>

<a href="/">Kalkulator</a>
<a href="/rozcienczenia">Rozcieńczenia</a>
<a href="/ceny">Ceny</a>
<a href="/historia">Historia</a>

</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

</div>

<!-- <script src="/static/main.js"></script> -->

</body>

</html>
