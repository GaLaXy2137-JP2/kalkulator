<!DOCTYPE html>
<html>

<head>

<title>APLIKACJA LICZARKOWA</title>

<link rel="stylesheet" href="/static/style.css?v=20260425-2">

<script>
(function () {
	const savedTheme = localStorage.getItem("app-theme")
	const preferredDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
	const theme = savedTheme || (preferredDark ? "dark" : "light")
	document.documentElement.setAttribute("data-theme", theme)
})()
</script>

<style>

:root{
--green:#16a34a;
--green-strong:#15803d;
--green-soft:#dcfce7;
--green-border:#86efac;
--green-shadow:rgba(22, 163, 74, 0.22);
--bg:#f4f6f7;
--bg-elevated:#ffffff;
--bg-muted:#f8fafc;
--bg-panel:#f0fdf4;
--text:#0f172a;
--text-muted:#64748b;
--border:#dbe4ef;
--border-soft:#e2e8f0;
--overlay:rgba(15, 23, 42, 0.18);
--topbar-bg:rgba(244, 246, 247, 0.92);
--shadow-soft:0 10px 24px rgba(15, 23, 42, 0.08);
--shadow-panel:0 14px 34px rgba(15, 23, 42, 0.06);
}

[data-theme="dark"]{
--green:#22c55e;
--green-strong:#16a34a;
--green-soft:rgba(34, 197, 94, 0.16);
--green-border:rgba(34, 197, 94, 0.34);
--green-shadow:rgba(34, 197, 94, 0.22);
--bg:#0b1220;
--bg-elevated:#111b2e;
--bg-muted:#0f172a;
--bg-panel:#122033;
--text:#e5eefb;
--text-muted:#9fb0c8;
--border:#24364f;
--border-soft:#1e2b40;
--overlay:rgba(2, 6, 23, 0.48);
--topbar-bg:rgba(11, 18, 32, 0.88);
--shadow-soft:0 12px 28px rgba(2, 6, 23, 0.42);
--shadow-panel:0 16px 34px rgba(2, 6, 23, 0.34);
}

body{
font-family: Arial;
background:var(--bg);
color:var(--text);
margin:0;
transition:background 0.2s ease, color 0.2s ease;
}

.wrapper{
min-height:100vh;
}

.sidebar{
position:fixed;
top:0;
left:0;
bottom:0;
width:min(320px, calc(100vw - 28px));
background:linear-gradient(180deg, color-mix(in srgb, var(--bg-elevated) 92%, transparent) 0%, color-mix(in srgb, var(--bg-panel) 82%, var(--bg-elevated) 18%) 100%);
color:var(--text);
padding:84px 18px 18px;
box-sizing:border-box;
transform:translateX(-100%);
transition:transform 0.25s ease;
z-index:40;
border-right:1px solid var(--border);
box-shadow:22px 0 44px rgba(15, 23, 42, 0.16);
backdrop-filter:blur(16px);
}

.sidebar.open{
transform:translateX(0);
}

.sidebar h2{
margin:0;
font-size:16px;
font-weight:800;
letter-spacing:0.08em;
text-transform:uppercase;
color:var(--text-muted);
}

.sidebar a{
display:flex;
align-items:center;
justify-content:space-between;
color:var(--text);
text-decoration:none;
padding:14px 16px;
margin-bottom:10px;
border-radius:16px;
border:1px solid transparent;
font-size:17px;
font-weight:700;
line-height:1.25;
transition:background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
}

.sidebar a:hover{
background:color-mix(in srgb, var(--green-soft) 58%, var(--bg-elevated) 42%);
border-color:var(--green-border);
box-shadow:0 10px 22px rgba(148, 163, 184, 0.16);
transform:translateX(2px);
}

.sidebar a.active{
background:linear-gradient(180deg, color-mix(in srgb, var(--green-soft) 54%, var(--bg-elevated) 46%) 0%, color-mix(in srgb, var(--green-soft) 72%, var(--bg-elevated) 28%) 100%);
border-color:var(--green-border);
color:var(--green);
box-shadow:0 14px 28px var(--green-shadow);
}

.sidebar_section{
display:flex;
flex-direction:column;
gap:16px;
height:100%;
}

.sidebar_brand{
display:flex;
flex-direction:column;
gap:8px;
padding:14px 14px 4px;
}

.sidebar_kicker{
margin:0;
font-size:12px;
font-weight:800;
letter-spacing:0.16em;
text-transform:uppercase;
color:var(--green);
}

.sidebar_note{
margin:0;
font-size:13px;
line-height:1.6;
color:var(--text-muted);
}

.sidebar_nav{
display:flex;
flex-direction:column;
gap:4px;
}

.sidebar_link_label{
display:inline-flex;
align-items:center;
gap:10px;
}

.sidebar_link_badge{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:28px;
height:28px;
padding:0 8px;
border-radius:999px;
background:var(--bg-muted);
border:1px solid var(--border-soft);
color:var(--text-muted);
font-size:11px;
font-weight:800;
letter-spacing:0.08em;
text-transform:uppercase;
}

.sidebar a.active .sidebar_link_badge{
background:var(--bg-elevated);
border-color:var(--green-border);
color:var(--green);
}

.sidebar_spacer{
flex:1;
}

.content{
width:100%;
box-sizing:border-box;
padding:88px 32px 32px;
}

.topbar{
position:fixed;
top:0;
left:0;
right:0;
height:72px;
display:flex;
align-items:center;
gap:16px;
justify-content:space-between;
padding:0 20px;
box-sizing:border-box;
background:var(--topbar-bg);
backdrop-filter:blur(10px);
z-index:30;
}

.topbar_start,
.topbar_end{
display:flex;
align-items:center;
gap:16px;
}

.menu_toggle{
display:inline-flex;
align-items:center;
justify-content:center;
width:48px;
height:48px;
padding:0;
border-radius:14px;
border:1px solid var(--border);
background:var(--bg-elevated);
color:var(--text);
box-shadow:var(--shadow-soft);
cursor:pointer;
}

.menu_toggle:hover,
.theme_toggle:hover{
background:var(--bg-muted);
}

.menu_toggle_bar{
display:block;
width:18px;
height:2px;
background:var(--text);
border-radius:999px;
position:relative;
}

.menu_toggle_bar::before,
.menu_toggle_bar::after{
content:"";
position:absolute;
left:0;
width:18px;
height:2px;
background:var(--text);
border-radius:999px;
}

.menu_toggle_bar::before{
top:-6px;
}

.menu_toggle_bar::after{
top:6px;
}

.topbar_title{
font-size:14px;
font-weight:700;
letter-spacing:0.08em;
text-transform:uppercase;
color:var(--text-muted);
}

.sr_only{
position:absolute;
width:1px;
height:1px;
padding:0;
margin:-1px;
overflow:hidden;
clip:rect(0, 0, 0, 0);
white-space:nowrap;
border:0;
}

.theme_toggle{
position:relative;
display:flex;
align-items:center;
gap:4px;
width:132px;
height:50px;
padding:5px;
border-radius:999px;
border:1px solid var(--border);
background:linear-gradient(180deg, color-mix(in srgb, var(--bg-elevated) 92%, transparent) 0%, color-mix(in srgb, var(--bg-panel) 82%, var(--bg-elevated) 18%) 100%);
color:var(--text);
box-shadow:var(--shadow-soft);
cursor:pointer;
}

.theme_toggle_option{
flex:1 1 0;
display:inline-flex;
align-items:center;
justify-content:center;
height:40px;
border-radius:999px;
font-size:18px;
line-height:1;
color:var(--text-muted);
background:transparent;
border:1px solid transparent;
transition:color 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

[data-theme="light"] .theme_toggle_option.sun,
[data-theme="dark"] .theme_toggle_option.moon{
color:#f8fff9;
background:linear-gradient(180deg, color-mix(in srgb, var(--green) 86%, white 14%) 0%, var(--green) 100%);
border-color:color-mix(in srgb, var(--green) 54%, white 46%);
box-shadow:0 10px 20px color-mix(in srgb, var(--green) 22%, transparent);
}

.theme_toggle:hover{
border-color:var(--green-border);
}

.sidebar_backdrop{
position:fixed;
inset:0;
background:var(--overlay);
opacity:0;
pointer-events:none;
transition:opacity 0.25s ease;
z-index:35;
}

.sidebar_backdrop.open{
opacity:1;
pointer-events:auto;
}

/* GLOBALNE STYLE APLIKACJI */

.container{
background:var(--bg-elevated);
padding:30px;
border-radius:10px;
width:700px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin:0 auto;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

input.search_box{
width:100%;
padding:10px 12px !important;
margin-top:5px;
margin-bottom:15px;
border-radius:8px !important;
border:1px solid var(--border) !important;
background:var(--bg-elevated) !important;
box-shadow:0 1px 2px rgba(15, 23, 42, 0.06) !important;
font-size:14px;
box-sizing:border-box;
color:var(--text) !important;
}

input.historia_search.search_box{
margin:0;
padding:6px 34px 6px 10px !important;
border-radius:6px !important;
font-size:13px;
height:32px;
}

button{
padding:12px;
background:var(--green);
color:white;
border:none;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:var(--green-strong);
}

.hil_switch{
display:inline-flex !important;
gap:6px !important;
padding:4px !important;
background:var(--bg-muted) !important;
border-radius:10px !important;
width:auto !important;
flex-wrap:nowrap !important;
}

.hil_switch button{
display:inline-flex !important;
align-items:center !important;
justify-content:center !important;
width:auto !important;
min-width:0 !important;
padding:6px 14px !important;
margin:0 !important;
border:none !important;
border-radius:8px !important;
background:transparent !important;
color:var(--text-muted) !important;
font-size:13px !important;
font-weight:600 !important;
line-height:1.2 !important;
white-space:nowrap !important;
box-shadow:none !important;
flex:none !important;
}

.hil_switch button:hover{
background:color-mix(in srgb, var(--green-soft) 42%, var(--bg-elevated) 58%) !important;
}

.hil_switch button.active{
background:var(--green) !important;
color:#fff !important;
}

.sekcja_naglowek{
display:flex;
align-items:baseline;
justify-content:flex-start;
gap:10px;
flex-wrap:wrap;
}

.sekcja_naglowek .mini_btn{
display:inline-flex;
align-items:center;
width:auto !important;
min-width:0;
padding:5px 10px !important;
margin:0;
background:var(--bg-muted) !important;
color:var(--text-muted) !important;
border:1px solid var(--border) !important;
border-radius:999px !important;
box-shadow:none !important;
font-size:12px;
font-weight:500;
line-height:1;
cursor:pointer;
white-space:nowrap;
transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.sekcja_naglowek .mini_btn:hover{
background:color-mix(in srgb, var(--green-soft) 42%, var(--bg-elevated) 58%) !important;
color:var(--text) !important;
border-color:var(--green-border) !important;
text-decoration:none;
}

.panel{
margin-top:25px;
padding:20px;
background:#ecf0f1;
border-radius:8px;
}

.rekomendacja{
font-size:28px;
font-weight:bold;
color:#2c3e50;
margin-bottom:10px;
}

.zakres{
font-size:18px;
margin-bottom:15px;
}

.crm{
margin-top:15px;
}

#crm_text{
white-space: pre-line;
line-height:1.3;
font-size:15px;
}

.copy{
background:#27ae60;
margin-top:10px;
}

.copy:hover{
background:#1e8449;
}

.btn_add_profile{
background:#ecf0f1;
color:#2c3e50;
margin-top:10px;
margin-bottom:10px;
}

.btn_add_profile:hover{
background:#dfe6e9;
}

.btn_remove{
background:#e74c3c;
margin-bottom:10px;
}

.btn_remove:hover{
background:#c0392b;
}

.lista{
border:1px solid #ccc;
max-height:150px;
overflow-y:auto;
margin-bottom:10px;
}

.lista div{
padding:6px;
cursor:pointer;
}

.lista div:hover{
background:#ecf0f1;
}

@media (max-width: 900px){
.content{
padding:84px 16px 24px;
}

.topbar{
padding:0 16px;
}
}

</style>

</head>

<body>

<div class="wrapper">

<div class="topbar">
<div class="topbar_start">
<button type="button" class="menu_toggle" id="menu_toggle" aria-label="Pokaż moduły" aria-expanded="false" aria-controls="sidebar">
<span class="menu_toggle_bar"></span>
</button>
<div class="topbar_title">Moduły</div>
</div>
<div class="topbar_end">
<button type="button" class="theme_toggle" id="theme_toggle" aria-label="Przełącz motyw">
<span class="sr_only">Przełącz motyw</span>
<span class="theme_toggle_option moon" aria-hidden="true">☾</span>
<span class="theme_toggle_option sun" aria-hidden="true">☀</span>
</button>
</div>
</div>

<div class="sidebar_backdrop" id="sidebar_backdrop"></div>

<div class="sidebar" id="sidebar">
<div class="sidebar_section">
<div class="sidebar_brand">
<p class="sidebar_kicker">Nawigacja</p>
<h2>Moduły</h2>
<p class="sidebar_note">Szybkie przełączanie między kalkulatorem, rozcieńczeniami, cenami i historią.</p>
</div>

<nav class="sidebar_nav" aria-label="Moduły">
<a href="/" class="{% if request.url.path == '/' %}active{% endif %}"><span class="sidebar_link_label">Kalkulator</span><span class="sidebar_link_badge">01</span></a>
<a href="/rozcienczenia" class="{% if request.url.path.startswith('/rozcienczenia') %}active{% endif %}"><span class="sidebar_link_label">Rozcieńczenia</span><span class="sidebar_link_badge">02</span></a>
<a href="/ceny" class="{% if request.url.path.startswith('/ceny') %}active{% endif %}"><span class="sidebar_link_label">Ceny</span><span class="sidebar_link_badge">03</span></a>
<a href="/historia" class="{% if request.url.path.startswith('/historia') %}active{% endif %}"><span class="sidebar_link_label">Historia</span><span class="sidebar_link_badge">04</span></a>
</nav>

<div class="sidebar_spacer"></div>
</div>
</div>

<div class="content">

{% block content %}
{% endblock %}

</div>

</div>

<!-- <script src="/static/main.js"></script> -->

<script>
(function () {
	const sidebar = document.getElementById("sidebar")
	const toggle = document.getElementById("menu_toggle")
	const backdrop = document.getElementById("sidebar_backdrop")
	const themeToggle = document.getElementById("theme_toggle")
	const root = document.documentElement

	if (!sidebar || !toggle || !backdrop) return

	function syncThemeButton() {
		if (!themeToggle) return
		const isDark = root.getAttribute("data-theme") === "dark"
		themeToggle.setAttribute("aria-pressed", String(isDark))
		themeToggle.setAttribute("aria-label", isDark ? "Przełącz na tryb jasny" : "Przełącz na tryb ciemny")
	}

	function setOpen(isOpen) {
		sidebar.classList.toggle("open", isOpen)
		backdrop.classList.toggle("open", isOpen)
		toggle.setAttribute("aria-expanded", String(isOpen))
	}

	toggle.addEventListener("click", function () {
		setOpen(!sidebar.classList.contains("open"))
	})

	backdrop.addEventListener("click", function () {
		setOpen(false)
	})

	sidebar.querySelectorAll("a").forEach(function (link) {
		link.addEventListener("click", function () {
			setOpen(false)
		})
	})

	document.addEventListener("keydown", function (event) {
		if (event.key === "Escape") {
			setOpen(false)
		}
	})

	if (themeToggle) {
		syncThemeButton()
		themeToggle.addEventListener("click", function () {
			const nextTheme = root.getAttribute("data-theme") === "dark" ? "light" : "dark"
			root.setAttribute("data-theme", nextTheme)
			localStorage.setItem("app-theme", nextTheme)
			syncThemeButton()
		})
	}
})()
</script>

</body>

</html>
